name: Tests

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install pytest requests playwright pytest-playwright
      - run: playwright install
      - run: pytest automation/test_ayama_funciones.py -v
      - run: pytest automation/test_web.py -v